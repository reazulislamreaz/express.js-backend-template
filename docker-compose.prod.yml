# Production stack for VPS deployment.
# Uses the image published by CD (ghcr.io) — no local build.
#
# Usage on VPS:
#   export APP_IMAGE=ghcr.io/<org>/express-template:latest
#   docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ${APP_IMAGE:?Set APP_IMAGE to your GHCR image}
    ports:
      - '127.0.0.1:${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/express_template?schema=public
      MONGODB_URI: mongodb://mongo:27017/express_template
      REDIS_URL: redis://redis:6379
      DOCS_ENABLED: 'false'
      LOG_PRETTY: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: express_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  backend:
    driver: bridge
